services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medusa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    networks:
      - medusa_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Medusa Server (API + Admin)
  medusa:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medusa_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${MEDUSA_PORT:-9000}:9000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD:-medusa}@postgres:5432/${POSTGRES_DB:-medusa}
      - DATABASE_SSL=false
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - STORE_CORS=${STORE_CORS:-http://localhost:8000,http://localhost:3000}
      - ADMIN_CORS=${ADMIN_CORS:-http://localhost:9000}
      - AUTH_CORS=${AUTH_CORS:-http://localhost:9000,http://localhost:8000}
      - MEDUSA_WORKER_MODE=shared
      - BACKEND_URL=${BACKEND_URL:-http://localhost:9000}
      # Optional S3/MinIO file storage
      - S3_FILE_URL=${S3_FILE_URL:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_REGION=${S3_REGION:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
    networks:
      - medusa_network

  # Optional: Dedicated Medusa Worker (for background jobs)
  # medusa-worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: medusa_worker
  #   restart: unless-stopped
  #   depends_on:
  #     - medusa
  #   environment:
  #     - NODE_ENV=production
  #     - DATABASE_URL=postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD:-medusa}@postgres:5432/${POSTGRES_DB:-medusa}
  #     - DATABASE_SSL=false
  #     - REDIS_URL=redis://redis:6379
  #     - JWT_SECRET=${JWT_SECRET}
  #     - COOKIE_SECRET=${COOKIE_SECRET}
  #     - MEDUSA_WORKER_MODE=worker
  #     - DISABLE_ADMIN=true
  #   networks:
  #     - medusa_network

volumes:
  postgres_data:

networks:
  medusa_network:
    driver: bridge
